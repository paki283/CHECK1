<!DOCTYPE html>
<html>
<head>
    <title>Bot Pairing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
       .box { background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #25D366; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
        #code { font-size: 32px; letter-spacing: 5px; margin: 20px 0; color: #25D366; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🤖 Bot Pairing</h2>
        <p>WhatsApp number dalo +92300xxxxxxx</p>
        <input type="text" id="number" placeholder="+92300xxxxxxx">
        <button onclick="getCode()">Pairing Code Lo</button>
        <div id="code"></div>
        <p id="status">Status: Disconnected</p>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            const res = await fetch('/pair', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({number: num})
            });
            const data = await res.json();
            if(data.code) {
                document.getElementById('code').innerText = data.code;
                document.getElementById('status').innerText = 'WhatsApp > Linked Devices > Link with phone number > Code dalo';
            } else {
                alert(data.error);
            }
        }

        setInterval(async () => {
            const res = await fetch('/status');
            const data = await res.json();
            document.getElementById('status').innerText = data.connected? 'Status: Connected ✅' : 'Status: Disconnected';
        }, 3000);
    </script>
</body>
</html>
