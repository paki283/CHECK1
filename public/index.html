<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Bot Pairing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1a1a1a;padding:30px;border-radius:12px;width:90%;max-width:400px}
input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#2a2a2a;color:#fff}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#25D366;color:#fff;font-weight:bold;cursor:pointer}
#code{font-size:32px;text-align:center;margin:20px 0;letter-spacing:5px;color:#25D366}
.status{margin-top:15px;text-align:center}
</style>
</head>
<body>
<div class="box">
<h2>🤖 WhatsApp Bot Pairing</h2>
<input id="num" placeholder="+92300xxxxxxx">
<button onclick="pair()">Pairing Code Lo</button>
<div id="code"></div>
<div class="status" id="status">Status: Disconnected</div>
</div>
<script>
async function pair(){
const num=document.getElementById('num').value;
const res=await fetch('/pair',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({number:num})});
const data=await res.json();
if(data.code){
document.getElementById('code').innerText=data.code;
document.getElementById('status').innerText='Code aa gaya! WhatsApp > Linked Devices > Link with phone number';
}else{
alert(data.error);
}
setInterval(async()=>{
const s=await fetch('/status').then(r=>r.json());
document.getElementById('status').innerText=s.connected?'Status: Connected ✅':'Status: Waiting...';
},3000);
}
</script>
</body>
</html>
