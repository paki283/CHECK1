<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE: WHATSAPP PAIRING</title>
    <style>
        body {
            background-color: #030303;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            width: 600px;
            padding: 20px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
            background: rgba(0, 10, 0, 0.9);
        }
        h2 { text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin: 20px 0; display: flex; gap: 10px; }
        input {
            flex: 1;
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
        }
        input:focus { outline: none; box-shadow: 0 0 5px #00ff00; }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #00ff00; }
        #output {
            margin-top: 20px;
            min-height: 100px;
            border-top: 1px dashed #00ff00;
            padding-top: 15px;
            white-space: pre-line;
        }
        .code-display {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <h2>[ Root@Bot-Core:~ ]</h2>
    <p>>>> Initialize WhatsApp Bot Linkage Protocol...</p>
    
    <div class="input-group">
        <input type="text" id="phone" placeholder="Enter Phone Number (e.g. 923XXXXXXXXX)" />
        <button onclick="requestPairingCode()">Link Device</button>
    </div>

    <div id="output">>>> Awaiting target credentials...</div>
</div>

<script>
    async function requestPairingCode() {
        const phone = document.getElementById('phone').value;
        const output = document.getElementById('output');
        if (!phone) {
            output.innerText = ">>> ERROR: Target phone number string cannot be empty.";
            return;
        }

        output.innerText = ">>> Injecting pairing request into network...\n>>> Please wait...";

        try {
            const response = await fetch(`/api/pair?phone=${phone}`);
            const data = await response.json();

            if (data.success) {
                output.innerHTML = `>>> PROTOCOL SUCCESSFUL.\n>>> Enter the following code on your phone notification:\n<div class="code-display">${data.code}</div>`;
            } else {
                output.innerText = `>>> ERROR: ${data.error}`;
            }
        } catch (err) {
            output.innerText = `>>> EXCEPTION: Failed to connect to core engine.`;
        }
    }
</script>
</body>
</html>
